server {
    listen 80;
    server_name ops.unocloud.us;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ops.unocloud.us;

    ssl_certificate     /etc/letsencrypt/live/ops.unocloud.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ops.unocloud.us/privkey.pem;

    # Frontend (React build)
    root /home/ubuntu/sigint-ops/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
